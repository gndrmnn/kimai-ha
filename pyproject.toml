[tool.black]
line-length    = 128
target-version = ['py313']

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W292", "ANN001", "ANN201", "ANN202", "ANN204", "ANN205", "ANN206", "RET501", "RET503", "UP", "PGH004", "PGH005"]
extend-select = ["I", "RUF100", "RUF101", "RUF102", "RUF200"]
ignore = ["E501"]

[tool.mypy]
warn_unreachable = true
ignore_missing_imports = true
install_types = true
non_interactive = true
check_untyped_defs = true
